<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Comercial | TPI Data Analytics</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { --ink:#172033; --blue:#2563eb; --bg:#f4f7fb; --card:#fff; }
    * { box-sizing:border-box; } body { margin:0; font-family:Arial,sans-serif; color:var(--ink); background:var(--bg); }
    header { padding:42px max(20px, calc((100% - 1180px)/2)); color:#fff; background:linear-gradient(120deg,#102a57,#2563eb); }
    h1 { margin:0 0 8px; } header p { margin:0; opacity:.9; }
    main { max-width:1180px; margin:28px auto; padding:0 20px; } .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .card,.chart { background:var(--card); border-radius:12px; padding:18px; box-shadow:0 2px 12px #17203314; } .metric { font-size:1.8rem; font-weight:700; color:var(--blue); }
    .charts { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px; margin-top:20px; } .chart { min-height:390px; }
    #status { margin:20px 0; padding:12px; border-radius:8px; background:#fff3cd; } footer { text-align:center; padding:25px; color:#60708b; }
    @media(max-width:760px) { .grid,.charts { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header><h1>Dashboard comercial</h1><p>Bezerra, Roberto · Comisión TT26109 · TPI Data Analytics</p></header>
  <main>
    <div id="status">Cargando datos consolidados…</div>
    <section class="grid">
      <article class="card"><span>Ingresos totales</span><div id="ingresos" class="metric">—</div></article>
      <article class="card"><span>Producto líder</span><div id="producto" class="metric">—</div></article>
      <article class="card"><span>Productos de alto rendimiento</span><div id="alto" class="metric">—</div></article>
    </section>
    <section class="charts">
      <div id="ranking" class="chart"></div>
      <div id="categoria" class="chart"></div>
      <div id="unidades" class="chart"></div>
      <div id="marketing" class="chart"></div>
      <div id="relacion" class="chart"></div>
      <div id="rendimiento" class="chart"></div>
    </section>
  </main>
  <footer>Fuente: dataset_final_consolidado.csv generado por el notebook del proyecto.</footer>
  <script>
    const formato = new Intl.NumberFormat('es-AR',{style:'currency',currency:'USD'});
    function csv(texto) {
      const [cabecera,...filas] = texto.trim().split(/\r?\n/);
      const columnas = cabecera.split(',');
      return filas.map(f => Object.fromEntries(f.split(',').map((v,i)=>[columnas[i],v])));
    }
    fetch('data/dataset_final_consolidado.csv').then(r => {
      if (!r.ok) throw new Error('No se encontró el CSV'); return r.text();
    }).then(texto => {
      const datos = csv(texto).map(d => ({...d, ingresos:+d.ingresos, alto_rendimiento:d.alto_rendimiento === 'True'}));
      const total = datos.reduce((s,d)=>s+d.ingresos,0), lider = [...datos].sort((a,b)=>b.ingresos-a.ingresos)[0];
      document.querySelector('#ingresos').textContent = formato.format(total);
      document.querySelector('#producto').textContent = lider.producto;
      document.querySelector('#alto').textContent = datos.filter(d=>d.alto_rendimiento).length;
      document.querySelector('#status').style.display='none';
      const top10 = [...datos].sort((a,b)=>b.ingresos-a.ingresos).slice(0,10).reverse();
      Plotly.newPlot('ranking',[{x:top10.map(d=>d.ingresos),y:top10.map(d=>d.producto),type:'bar',orientation:'h',marker:{color:'#2563eb'}}],{title:'Top 10 productos por ingresos',margin:{l:160},xaxis:{tickprefix:'$'}} ,{responsive:true});
      const categorias = [...new Set(datos.map(d=>d.categoria))];
      Plotly.newPlot('categoria',[{x:categorias,y:categorias.map(c=>datos.filter(d=>d.categoria===c).reduce((s,d)=>s+d.ingresos,0)),type:'bar',marker:{color:'#16a34a'}}],{title:'Ingresos por categoría',yaxis:{tickprefix:'$'}},{responsive:true});
      Plotly.newPlot('unidades',[{x:top10.map(d=>d.unidades),y:top10.map(d=>d.producto),type:'bar',orientation:'h',marker:{color:'#f97316'}}],{title:'Unidades vendidas — Top 10 por ingresos',margin:{l:160},xaxis:{title:'Unidades'}},{responsive:true});
      Plotly.newPlot('marketing',[{x:top10.map(d=>d.producto),y:top10.map(d=>+d.costo_marketing),type:'bar',marker:{color:'#7c3aed'}}],{title:'Inversión de marketing — Top 10 productos',yaxis:{title:'Costo ($)',tickprefix:'$'},margin:{b:130}},{responsive:true});
      Plotly.newPlot('relacion',[{x:datos.map(d=>+d.costo_marketing),y:datos.map(d=>d.ingresos),text:datos.map(d=>d.producto),mode:'markers',type:'scatter',marker:{size:datos.map(d=>Math.max(9,Math.sqrt(+d.unidades)*4)),color:datos.map(d=>d.alto_rendimiento ? '#16a34a' : '#94a3b8'),opacity:.8}}],{title:'Relación entre marketing e ingresos',xaxis:{title:'Costo de marketing ($)',tickprefix:'$'},yaxis:{title:'Ingresos ($)',tickprefix:'$'}},{responsive:true});
      const altos = datos.filter(d=>d.alto_rendimiento);
      Plotly.newPlot('rendimiento',[{labels:['Alto rendimiento','Resto de productos'],values:[altos.length,datos.length-altos.length],type:'pie',hole:.48,marker:{colors:['#2563eb','#cbd5e1']},textinfo:'label+value'}],{title:'Distribución de productos por rendimiento'},{responsive:true});
    }).catch(() => document.querySelector('#status').innerHTML = '<strong>Falta el archivo de datos.</strong> Ejecute el notebook en Colab y copie <code>dataset_final_consolidado.csv</code> en <code>docs/data/</code>.');
  </script>
</body>
</html>
