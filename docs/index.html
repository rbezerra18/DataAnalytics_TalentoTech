<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Comercial | TPI Data Analytics</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{--ink:#172033;--blue:#2563eb;--bg:#f4f7fb;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;color:var(--ink);background:var(--bg)}
    header{padding:42px max(20px,calc((100% - 1200px)/2));color:#fff;background:linear-gradient(120deg,#102a57,#2563eb)}h1{margin:0 0 8px}header p{margin:0;opacity:.9}
    main{max-width:1240px;margin:36px auto;padding:0 24px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.card,.chart,.filters{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 4px 18px #17203312}.metric{font-size:1.8rem;font-weight:700;color:var(--blue)}
    .filters{display:flex;gap:18px;align-items:end;flex-wrap:wrap;margin:28px 0 34px}.filters label{display:grid;gap:7px;font-weight:600}select{min-width:230px;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:1rem}
    .charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:36px}.chart{min-height:420px}#status{margin:20px 0;padding:12px;border-radius:8px;background:#fff3cd}footer{text-align:center;padding:25px;color:#60708b}
    @media(max-width:760px){.grid,.charts{grid-template-columns:1fr}.filters{align-items:stretch}select{width:100%}}
  </style>
</head>
<body>
  <header><h1>Dashboard Comercial</h1><p>Bezerra, Roberto · Comisión TT26109 · TPI Data Analytics</p></header>
  <main>
    <div id="status">Cargando datos consolidados…</div>
    <section class="grid">
      <article class="card"><span>Ingresos totales</span><div id="ingresos" class="metric">—</div></article>
      <article class="card"><span>Producto líder</span><div id="producto" class="metric">—</div></article>
      <article class="card"><span>Productos de alto rendimiento</span><div id="alto" class="metric">—</div></article>
    </section>
    <section class="filters" aria-label="Filtros del dashboard">
      <label>Categoría<select id="filtro-categoria"><option value="Todas">Todas las categorías</option></select></label>
      <label>Rendimiento<select id="filtro-rendimiento"><option value="Todos">Todos los productos</option><option value="alto">Solo alto rendimiento</option><option value="resto">Resto de productos</option></select></label>
    </section>
    <section class="charts">
      <div id="mensual" class="chart"></div><div id="ranking" class="chart"></div><div id="categoria" class="chart"></div><div id="unidades" class="chart"></div><div id="marketing" class="chart"></div><div id="relacion" class="chart"></div><div id="rendimiento" class="chart"></div>
    </section>
  </main>
  <footer>Fuente: archivos consolidados generados por el notebook del proyecto.</footer>
  <script>
    const formato=new Intl.NumberFormat('es-AR',{style:'currency',currency:'USD'});
    function csv(t){const [h,...f]=t.trim().split(/\r?\n/),c=h.split(',');return f.map(r=>Object.fromEntries(r.split(',').map((v,i)=>[c[i],v])))}
    Promise.all([fetch('data/dataset_final_consolidado.csv'),fetch('data/ingresos_mensuales.csv')]).then(async r=>{if(r.some(x=>!x.ok))throw Error();return Promise.all(r.map(x=>x.text()))}).then(([a,b])=>{
      const datos=csv(a).map(d=>({...d,ingresos:+d.ingresos,unidades:+d.unidades,costo_marketing:+d.costo_marketing,alto_rendimiento:d.alto_rendimiento==='True'})),mensuales=csv(b).map(d=>({...d,ingresos:+d.ingresos}));
      const cat=document.querySelector('#filtro-categoria'),rend=document.querySelector('#filtro-rendimiento');[...new Set(datos.map(d=>d.categoria))].sort().forEach(c=>cat.add(new Option(c,c)));
      const agrupar=(f,campo,medida='ingresos')=>[...f.reduce((m,x)=>m.set(x[campo],(m.get(x[campo])||0)+x[medida]),new Map())];
      function renderizar(){
        const filtrados=datos.filter(d=>(cat.value==='Todas'||d.categoria===cat.value)&&(rend.value==='Todos'||(rend.value==='alto'?d.alto_rendimiento:!d.alto_rendimiento))),nombres=new Set(filtrados.map(d=>d.producto)),serie=mensuales.filter(d=>(cat.value==='Todas'||d.categoria===cat.value)&&nombres.has(d.producto)),top=[...filtrados].sort((a,b)=>b.ingresos-a.ingresos).slice(0,10).reverse(),mes=agrupar(serie,'mes'),categorias=agrupar(filtrados,'categoria'),total=filtrados.reduce((s,d)=>s+d.ingresos,0),lider=[...filtrados].sort((a,b)=>b.ingresos-a.ingresos)[0],altos=filtrados.filter(d=>d.alto_rendimiento),cfg={responsive:true,displaylogo:false};
        document.querySelector('#ingresos').textContent=formato.format(total);document.querySelector('#producto').textContent=lider?lider.producto:'Sin datos';document.querySelector('#alto').textContent=altos.length;
        Plotly.react('mensual',[{x:mes.map(x=>x[0]),y:mes.map(x=>x[1]),type:'scatter',mode:'lines+markers',line:{color:'#0ea5e9',width:3}}],{title:'Ingresos mensuales',xaxis:{title:'Mes'},yaxis:{title:'Ingresos ($)',tickprefix:'$'}},cfg);
        Plotly.react('ranking',[{x:top.map(d=>d.ingresos),y:top.map(d=>d.producto),type:'bar',orientation:'h',marker:{color:'#2563eb'}}],{title:'Top 10 productos por ingresos',margin:{l:160},xaxis:{tickprefix:'$'}},cfg);
        Plotly.react('categoria',[{x:categorias.map(x=>x[0]),y:categorias.map(x=>x[1]),type:'bar',marker:{color:'#16a34a'}}],{title:'Ingresos por categoría',yaxis:{tickprefix:'$'}},cfg);
        Plotly.react('unidades',[{x:top.map(d=>d.unidades),y:top.map(d=>d.producto),type:'bar',orientation:'h',marker:{color:'#f97316'}}],{title:'Unidades vendidas - Top 10 por ingresos',margin:{l:160}},cfg);
        Plotly.react('marketing',[{x:top.map(d=>d.producto),y:top.map(d=>d.costo_marketing),type:'bar',marker:{color:'#7c3aed'}}],{title:'Inversión de marketing - Top 10 productos',yaxis:{tickprefix:'$'},margin:{b:130}},cfg);
        Plotly.react('relacion',[{x:filtrados.map(d=>d.costo_marketing),y:filtrados.map(d=>d.ingresos),text:filtrados.map(d=>d.producto),mode:'markers',type:'scatter',marker:{size:filtrados.map(d=>Math.max(9,Math.sqrt(d.unidades)*4)),color:filtrados.map(d=>d.alto_rendimiento?'#16a34a':'#94a3b8'),opacity:.8}}],{title:'Relación entre marketing e ingresos',xaxis:{title:'Costo de marketing ($)',tickprefix:'$'},yaxis:{title:'Ingresos ($)',tickprefix:'$'}},cfg);
        Plotly.react('rendimiento',[{labels:['Alto rendimiento','Resto de productos'],values:[altos.length,filtrados.length-altos.length],type:'pie',hole:.48,marker:{colors:['#2563eb','#cbd5e1']},textinfo:'label+value'}],{title:'Distribución de productos por rendimiento'},cfg);
      }
      cat.addEventListener('change',renderizar);rend.addEventListener('change',renderizar);document.querySelector('#status').style.display='none';renderizar();
    }).catch(()=>document.querySelector('#status').innerHTML='<strong>Faltan archivos de datos.</strong> Revise la carpeta docs/data/.');
  </script>
</body>
</html>
